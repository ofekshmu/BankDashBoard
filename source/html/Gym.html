<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעקב ג׳ים</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1e2a4a;--teal:#1e9d8b;--teal-light:#e8f6f4;
  --bg:#f6f8fc;--white:#fff;--border:#e5e9f0;
  --text:#1e2a4a;--muted:#7a8096;--red:#e74c3c;
  --shadow-sm:0 2px 8px rgba(30,42,74,.08);--shadow-md:0 4px 16px rgba(30,42,74,.13);
  --radius:12px;--radius-sm:8px;--tr:.16s ease;
}
body{background:var(--bg);min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--text);line-height:1.5;direction:rtl}
.page{max-width:960px;margin:0 auto;padding:1.5rem 1.25rem 4rem}

/* ── Header ── */
.hdr{display:flex;align-items:center;gap:1rem;padding:1.5rem 0 1.75rem;border-bottom:1.5px solid var(--border);margin-bottom:1.75rem;flex-wrap:wrap}
.hdr-icon{font-size:2.2rem;line-height:1}
.hdr-text h1{font-size:1.75rem;font-weight:800;color:var(--navy);letter-spacing:-.4px}
.hdr-text p{color:var(--muted);font-size:.88rem;margin-top:.15rem}
.hdr-actions{margin-right:auto;display:flex;gap:.5rem;flex-wrap:wrap}
.back-link{display:inline-flex;align-items:center;gap:.35rem;color:var(--muted);font-size:.82rem;text-decoration:none;margin-bottom:.75rem;transition:color var(--tr)}
.back-link:hover{color:var(--teal)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1.1rem;border-radius:20px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;transition:all var(--tr);font-family:inherit}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:#188f7e}
.btn-outline{background:var(--white);border:1.5px solid var(--border);color:var(--muted)}
.btn-outline:hover{border-color:var(--navy);color:var(--navy)}
.btn-sm{padding:.35rem .8rem;font-size:.76rem}

/* ── Section titles ── */
.sec{margin:2rem 0 .85rem}
.sec h2{font-size:1.15rem;font-weight:700;color:var(--navy)}
.sec p{font-size:.82rem;color:var(--muted);margin-top:.2rem}

/* ── Member cards ── */
.members{display:flex;flex-wrap:wrap;gap:.9rem}
.card{flex:1 1 180px;background:var(--white);border-radius:var(--radius);padding:1.15rem 1.1rem 1rem;border-top:4px solid var(--teal);box-shadow:var(--shadow-sm);transition:box-shadow var(--tr),transform var(--tr)}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.avatar{width:42px;height:42px;border-radius:50%;background:var(--teal-light);display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:800;color:var(--teal);margin-bottom:.75rem}
.card-name{font-size:.95rem;font-weight:700;color:var(--navy);margin-bottom:.6rem}
.stat{display:flex;justify-content:space-between;font-size:.76rem;color:var(--muted);margin-top:.22rem}
.stat .v{font-weight:700;color:var(--navy)}.v.pos{color:var(--teal)}.v.neg{color:var(--red)}

/* ── Recommendation banner ── */
.rec{background:linear-gradient(135deg,var(--teal),#188f7e);border-radius:var(--radius);padding:1.25rem 1.5rem;display:flex;align-items:center;gap:1.25rem;margin:1.5rem 0;box-shadow:0 4px 18px rgba(30,157,139,.28);flex-wrap:wrap}
.rec-lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.7);white-space:nowrap}
.rec-name{font-size:1.5rem;font-weight:900;color:#fff;letter-spacing:-.4px}
.rec-detail{font-size:.83rem;color:rgba(255,255,255,.8);margin-right:auto}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:.5rem;background:var(--white);box-shadow:var(--shadow-sm)}
table{width:100%;border-collapse:collapse;font-size:.84rem}
thead{background:#f0f3fa}
th{padding:.7rem .9rem;text-align:right;color:var(--muted);font-weight:600;font-size:.73rem;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;border-bottom:1.5px solid var(--border)}
td{padding:.65rem .9rem;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:nth-child(even) td{background:#fafbfd}
tbody tr:hover td{background:var(--teal-light)}
td.pos{color:var(--teal);font-weight:600}td.neg{color:var(--red);font-weight:600}
.badge{display:inline-block;background:var(--teal-light);color:var(--teal);font-size:.68rem;font-weight:700;padding:.12rem .5rem;border-radius:20px;border:1px solid rgba(30,157,139,.25)}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.88rem;padding:3px 7px;border-radius:4px;transition:color var(--tr),background var(--tr)}
.del-btn:hover{color:var(--red);background:rgba(231,76,60,.08)}

/* ── Empty state ── */
.empty{text-align:center;padding:2.5rem;color:var(--muted);font-size:.88rem}

/* ── Modal ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(30,42,74,.45);z-index:100;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 12px 40px rgba(30,42,74,.2);border:1px solid var(--border)}
.modal h3{font-size:1.05rem;font-weight:700;color:var(--navy);margin-bottom:1.25rem}
.field{margin-bottom:.9rem}
.field label{display:block;font-size:.76rem;color:var(--muted);margin-bottom:.35rem;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:.55rem .75rem;font-size:.88rem;font-family:inherit;outline:none;transition:border-color var(--tr)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);background:var(--white)}
.field textarea{resize:vertical;min-height:56px}

/* ── Attendee chips (multi-select) ── */
.chips{display:flex;flex-wrap:wrap;gap:.45rem;margin-top:.25rem}
.chip{display:inline-flex;align-items:center;gap:.3rem;background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:.32rem .85rem;cursor:pointer;font-size:.82rem;color:var(--muted);user-select:none;transition:border-color var(--tr),background var(--tr),color var(--tr)}
.chip:hover{border-color:var(--teal);color:var(--navy)}
.chip.sel{border-color:var(--teal);background:var(--teal-light);color:var(--teal);font-weight:600}
.chip.sel::before{content:'✓  ';font-size:.72rem}

.modal-actions{display:flex;gap:.65rem;justify-content:flex-end;margin-top:1.25rem;flex-wrap:wrap}

/* ── Toast ── */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--navy);color:#fff;padding:.6rem 1.25rem;border-radius:20px;font-size:.82rem;font-weight:600;z-index:200;transition:transform .3s ease,opacity .3s ease;opacity:0;pointer-events:none;box-shadow:var(--shadow-md)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── Manage list ── */
.p-list{list-style:none;margin-top:.5rem}
.p-item{display:flex;align-items:center;gap:.6rem;padding:.5rem 0;border-bottom:1px solid var(--border)}
.p-item:last-child{border-bottom:none}
.p-item .p-name{flex:1;font-size:.9rem;color:var(--navy);font-weight:500}
.p-badge{font-size:.69rem;padding:.12rem .45rem;border-radius:20px;font-weight:700}
.p-badge.active{background:var(--teal-light);color:var(--teal)}
.p-badge.inactive{background:#f0f3fa;color:var(--muted)}
.icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:3px 7px;border-radius:4px;font-size:.85rem;transition:color var(--tr),background var(--tr)}
.icon-btn:hover{color:var(--navy);background:#f0f3fa}

/* ── Responsive ── */
@media(max-width:600px){
  .page{padding:1rem .9rem 3rem}
  .hdr{padding:1.1rem 0 1.4rem}
  .hdr-text h1{font-size:1.4rem}
  .hdr-actions{margin-right:0;width:100%}
  .members{flex-direction:column}
  .card{flex:1 1 auto}
  .rec{flex-direction:column;align-items:flex-start;gap:.4rem}
  .rec-detail{margin-right:0}
  th,td{padding:.55rem .65rem;font-size:.78rem}
}
</style>
</head>
<body>
<div class="page">

  <a class="back-link" href="/">&#8592; חזרה לדשבורד</a>

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-icon">&#x1F4AA;</div>
    <div class="hdr-text">
      <h1>מעקב ג׳ים</h1>
      <p>חלוקת הוצאות ותשלומים משותפים</p>
    </div>
    <div class="hdr-actions">
      <button class="btn btn-primary" onclick="openSessionModal()">+ תיעוד אימון</button>
      <button class="btn btn-outline" onclick="openManageModal()">&#9881; ניהול משתתפים</button>
    </div>
  </div>

  <!-- Member cards -->
  <div class="sec"><h2>משתתפים</h2></div>
  <div class="members" id="members"></div>

  <!-- Recommendation -->
  <div class="rec" id="rec" style="display:none">
    <div>
      <div class="rec-lbl">תור לשלם</div>
      <div class="rec-name" id="rec-name">&#x2014;</div>
    </div>
    <div class="rec-detail" id="rec-detail"></div>
  </div>

  <!-- Debt table -->
  <div class="sec"><h2>פירוט חוב</h2><p>מי חייב למי (סך כולל)</p></div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>שם</th><th>שילם עבור אחרים (&#8362;)</th><th>חייב לאחרים (&#8362;)</th>
        <th>יתרה נטו (&#8362;)</th><th>סה&#x22;כ ששולם (&#8362;)</th><th>אימונים</th>
      </tr></thead>
      <tbody id="debt-body"></tbody>
    </table>
  </div>

  <!-- Session history -->
  <div class="sec"><h2>היסטוריית אימונים</h2><p>הכי חדש ראשון</p></div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>#</th><th>תאריך</th><th>משתתפים</th><th>שילם</th>
        <th>מחיר לאדם (&#8362;)</th><th>סה&#x22;כ (&#8362;)</th><th>הערות</th><th></th>
      </tr></thead>
      <tbody id="sessions-body"></tbody>
    </table>
  </div>

</div>

<!-- Add session modal -->
<div class="overlay" id="session-overlay">
  <div class="modal">
    <h3>תיעוד אימון חדש</h3>
    <div class="field">
      <label>תאריך</label>
      <input type="date" id="s-date">
    </div>
    <div class="field">
      <label>משתתפים — ניתן לבחור מספר</label>
      <div class="chips" id="s-attendees"></div>
    </div>
    <div class="field">
      <label>מחיר לאדם (&#8362;)</label>
      <input type="number" id="s-price" step="0.5" min="0" placeholder="25">
    </div>
    <div class="field">
      <label>מי שילם?</label>
      <select id="s-payer"></select>
    </div>
    <div class="field">
      <label>הערות (אופציונלי)</label>
      <textarea id="s-notes" rows="2"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeSessionModal()">ביטול</button>
      <button class="btn btn-primary" onclick="submitSession()">שמור</button>
    </div>
  </div>
</div>

<!-- Manage participants modal -->
<div class="overlay" id="manage-overlay">
  <div class="modal">
    <h3>ניהול משתתפים</h3>
    <ul class="p-list" id="p-list"></ul>
    <div style="margin-top:1.1rem;display:flex;gap:.5rem">
      <input type="text" id="new-p-name" placeholder="שם משתתף חדש..."
        style="flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:.5rem .75rem;font-size:.88rem;font-family:inherit;outline:none"
        onkeydown="if(event.key==='Enter')addParticipant()">
      <button class="btn btn-primary btn-sm" onclick="addParticipant()">הוסף</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeManageModal()">סגור</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let _data = {debts:[], sessions:[], last_price:25};

async function load() {
  try {
    const r = await fetch('/api/gym/summary');
    const d = await r.json();
    if (!d.ok) { showToast('שגיאה בטעינת נתונים'); return; }
    _data = d;
    renderAll();
  } catch(e) { showToast('שגיאת רשת'); }
}

function renderAll() {
  renderMembers(); renderRec(); renderDebts(); renderSessions();
}

function renderMembers() {
  const el = document.getElementById('members');
  if (!_data.debts.length) {
    el.innerHTML = '<div class="empty">אין משתתפים עדיין — הוסף דרך "ניהול משתתפים".</div>';
    return;
  }
  el.innerHTML = _data.debts.map(p => `
    <div class="card">
      <div class="avatar">${esc(p.name).charAt(0).toUpperCase()}</div>
      <div class="card-name">${esc(p.name)}</div>
      <div class="stat"><span>אימונים</span><span class="v">${p.sessions}</span></div>
      <div class="stat"><span>שולם סה&#x22;כ</span><span class="v">&#8362;${fmt(p.total_paid)}</span></div>
      <div class="stat"><span>שילם עבור אחרים</span><span class="v ${p.fronted>0?'pos':''}">${p.fronted>0?'+':''}&#8362;${fmt(p.fronted)}</span></div>
      <div class="stat"><span>חייב לאחרים</span><span class="v ${p.owed>0?'neg':''}">${p.owed>0?'-':''}&#8362;${fmt(p.owed)}</span></div>
      <div class="stat"><span>יתרה נטו</span><span class="v ${p.net>0?'pos':p.net<0?'neg':''}">${p.net>0?'+':''}&#8362;${fmt(p.net)}</span></div>
    </div>`).join('');
}

function renderRec() {
  const rec = document.getElementById('rec');
  if (!_data.debts.length) { rec.style.display='none'; return; }
  const worst = _data.debts[0];
  rec.style.display = 'flex';
  document.getElementById('rec-name').textContent = worst.name;
  document.getElementById('rec-detail').textContent =
    'יתרה נטו: ' + (worst.net>0?'+':'') + '&#8362;' + fmt(worst.net) + ' — תור לשלם הפעם';
}

function renderDebts() {
  const tb = document.getElementById('debt-body');
  if (!_data.debts.length) {
    tb.innerHTML = '<tr><td colspan="6" class="empty">אין נתונים עדיין</td></tr>'; return;
  }
  tb.innerHTML = _data.debts.map(p => `
    <tr>
      <td>${esc(p.name)}</td>
      <td class="${p.fronted>0?'pos':''}">&#8362;${fmt(p.fronted)}</td>
      <td class="${p.owed>0?'neg':''}">&#8362;${fmt(p.owed)}</td>
      <td class="${p.net>0?'pos':p.net<0?'neg':''}">&#8362;${p.net>0?'+':''}${fmt(p.net)}</td>
      <td>&#8362;${fmt(p.total_paid)}</td>
      <td>${p.sessions}</td>
    </tr>`).join('');
}

function renderSessions() {
  const tb = document.getElementById('sessions-body');
  if (!_data.sessions.length) {
    tb.innerHTML = '<tr><td colspan="8" class="empty">אין אימונים מתועדים עדיין</td></tr>'; return;
  }
  tb.innerHTML = _data.sessions.map(s => `
    <tr>
      <td>${s.id}</td><td>${s.date}</td>
      <td>${esc(s.attendees.join(', '))}</td>
      <td><span class="badge">${esc(s.payer)}</span></td>
      <td>&#8362;${fmt(s.price)}</td><td>&#8362;${fmt(s.total)}</td>
      <td>${esc(s.notes)}</td>
      <td><button class="del-btn" onclick="deleteSession(${s.id})" title="מחק">&#x1F5D1;</button></td>
    </tr>`).join('');
}

// ── Session modal ─────────────────────────────────────────────
function populateSessionForm() {
  document.getElementById('s-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('s-price').value = _data.last_price || 25;
  document.getElementById('s-notes').value = '';

  const active = _data.debts.filter(p => p.is_active !== false);

  // Chips — using <span> (not <label>) to avoid the native checkbox double-toggle bug
  document.getElementById('s-attendees').innerHTML = active.map(p =>
    `<span class="chip" data-pid="${p.id}" onclick="this.classList.toggle('sel')">${esc(p.name)}</span>`
  ).join('');

  const sel = document.getElementById('s-payer');
  sel.innerHTML = active.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('');
  if (_data.debts.length) sel.value = _data.debts[0].id;
}

function openSessionModal()  { populateSessionForm(); document.getElementById('session-overlay').classList.add('open'); }
function closeSessionModal() { document.getElementById('session-overlay').classList.remove('open'); }

async function submitSession() {
  const date  = document.getElementById('s-date').value;
  const price = parseFloat(document.getElementById('s-price').value) || 25;
  const payer = parseInt(document.getElementById('s-payer').value);
  const notes = document.getElementById('s-notes').value.trim();
  let attendees = [...document.querySelectorAll('#s-attendees .chip.sel')]
                      .map(el => parseInt(el.dataset.pid));

  if (!attendees.length) { showToast('יש לבחור לפחות משתתף אחד'); return; }
  if (!payer)             { showToast('יש לבחור מי שילם'); return; }
  if (price <= 0)         { showToast('המחיר חייב להיות חיובי'); return; }
  if (!attendees.includes(payer)) attendees = [payer, ...attendees];

  const r = await fetch('/api/gym/sessions', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({date, price, payer_id:payer, attendees, notes})
  });
  const d = await r.json();
  if (d.ok) { closeSessionModal(); showToast('✓ אימון נשמר'); load(); }
  else showToast('שגיאה: ' + (d.error||''));
}

async function deleteSession(sid) {
  if (!confirm('למחוק אימון זה?')) return;
  const r = await fetch('/api/gym/sessions/'+sid, {method:'DELETE'});
  const d = await r.json();
  if (d.ok) { showToast('אימון נמחק'); load(); }
  else showToast('שגיאה: ' + (d.error||''));
}

// ── Manage participants modal ─────────────────────────────────
async function openManageModal()  { await renderParticipantList(); document.getElementById('manage-overlay').classList.add('open'); }
function closeManageModal() { document.getElementById('manage-overlay').classList.remove('open'); load(); }

async function renderParticipantList() {
  const r = await fetch('/api/gym/participants');
  const d = await r.json();
  const ul = document.getElementById('p-list');
  if (!d.ok || !d.participants.length) {
    ul.innerHTML = '<li class="empty" style="padding:.75rem 0">אין משתתפים עדיין</li>'; return;
  }
  ul.innerHTML = d.participants.map(p => `
    <li class="p-item" id="pitem-${p.id}">
      <span class="p-name" id="pname-${p.id}">${esc(p.name)}</span>
      <span class="p-badge ${p.is_active?'active':'inactive'}">${p.is_active?'פעיל':'לא פעיל'}</span>
      <div style="display:flex;gap:.35rem">
        <button class="icon-btn" title="שנה שם" onclick="editName(${p.id})">&#x270F;&#xFE0F;</button>
        <button class="icon-btn" title="${p.is_active?'השבת':'הפעל'}" onclick="toggleActive(${p.id},${p.is_active})">
          ${p.is_active?'&#x23F8;':'&#x25B6;'}
        </button>
      </div>
    </li>`).join('');
}

async function addParticipant() {
  const inp = document.getElementById('new-p-name');
  const name = inp.value.trim();
  if (!name) return;
  const r = await fetch('/api/gym/participants', {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name})
  });
  const d = await r.json();
  if (d.ok) { inp.value=''; renderParticipantList(); showToast('✓ ' + name + ' נוסף'); }
  else showToast('שגיאה: ' + (d.error||''));
}

async function editName(pid) {
  const current = document.getElementById('pname-'+pid).textContent;
  const name = prompt('שם חדש:', current);
  if (!name || !name.trim() || name.trim() === current) return;
  const r = await fetch('/api/gym/participants/'+pid, {
    method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name: name.trim()})
  });
  const d = await r.json();
  if (d.ok) { renderParticipantList(); showToast('✓ שם עודכן'); }
  else showToast('שגיאה: ' + (d.error||''));
}

async function toggleActive(pid, current) {
  const r = await fetch('/api/gym/participants/'+pid, {
    method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({is_active: !current})
  });
  const d = await r.json();
  if (d.ok) renderParticipantList();
  else showToast('שגיאה: ' + (d.error||''));
}

function fmt(n) { return Number(n).toFixed(2).replace(/\.00$/, ''); }
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.getElementById('session-overlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeSessionModal(); });
document.getElementById('manage-overlay').addEventListener('click',  e => { if(e.target===e.currentTarget) closeManageModal(); });

load();
</script>
</body>
